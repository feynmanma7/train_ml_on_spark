# ============================================================
# 特征配置文件
# 定义类别特征（categorical）和数值特征（numerical）
# 在代码中读取此配置，分别进行相应的预处理
# ============================================================

features:
  categorical:
    # 类别特征：将用于 StringIndexer + OneHotEncoder 编码
    - payment_method     # 支付方式: credit_card, debit_card, bank_transfer, wallet, cash
    - merchant_category  # 商户类别: retail, food, travel, entertainment, healthcare, utility, education, other
    - transaction_hour_bucket  # 交易小时分段: night, morning, afternoon, evening
    - device_type        # 设备类型: mobile, desktop, tablet, other
    - card_present       # 是否实体卡: yes, no

  numerical:
    # 数值特征：将用于 Imputer（缺失值填充）+ StandardScaler 标准化
    # 基础交易特征
    - amount
    - amount_ratio_to_avg   # 交易金额 / 用户平均金额
    - transaction_count_1h  # 过去1小时交易次数
    - transaction_count_24h # 过去24小时交易次数
    - transaction_count_7d  # 过去7天交易次数
    # 用户行为特征
    - user_age
    - account_age_days
    - credit_score
    - login_failures_24h
    - device_change_count_7d
    # 商户特征
    - merchant_risk_score
    - merchant_avg_amount
    - merchant_distance_km
    # 时间特征
    - hour
    - day_of_week
    - is_weekend
    # 金额特征
    - amount_zscore           # 金额的z-score（相对于用户历史）
    - amount_log              # 金额的对数变换
    # 交互特征（可在预处理后添加）
    - velocity_amount         # 交易速度 * 金额
    - amount_per_transaction  # 7天总金额 / 7天交易次数

  # 目标列
  label_col: is_fraud

  # 不需要处理的列（ID、时间戳等）
  drop_cols:
    - transaction_id
    - timestamp
