# docker-compose.yml - Spark cluster + MinIO (S3-compatible storage)
version: "3.8"

services:
  # ---------- MinIO S3 ----------
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  # ---------- Spark Cluster ----------
  spark-master:
    image: spark-xgb:latest
    container_name: spark-master
    ports:
      - "8080:8080"   # Spark Master web UI
      - "7077:7077"   # Spark Master port
      - "4040:4040"   # Spark application UI
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - spark-data:/opt/spark/work-dir
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1

  spark-worker-1:
    image: spark-xgb:latest
    container_name: spark-worker-1
    depends_on:
      - spark-master
      - minio
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/work-dir
      - /Users/mac/data/notebook:/home/feynman/work/data

  spark-worker-2:
    image: spark-xgb:latest
    container_name: spark-worker-2
    depends_on:
      - spark-master
      - minio
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=1
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    volumes:
      - spark-data:/opt/spark/work-dir
      - /Users/mac/data/notebook:/home/feynman/work/data

  jupyter:
    image: spark-xgb:latest
    container_name: spark-jupyter
    ports:
      - "8888:8888"
    environment:
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 pyspark-shell
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    command: >
      jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --ServerApp.default_url=/lab --ServerApp.iopub_data_rate_limit=1e10 --NotebookApp.token='' --NotebookApp.password='' --notebook-dir=/home/feynman/work
    volumes:
      - ./notebooks:/home/feynman/work
      - /Users/mac/data/notebook:/home/feynman/work/data
      - spark-data:/opt/spark/work-dir
    depends_on:
      - spark-master
      - minio

volumes:
  spark-data:
  minio-data:
